name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip autoconf automake build-essential libssl-dev libffi-dev python3-dev
          pip3 install --upgrade pip
          pip3 install buildozer cython

      - name: Install Android SDK components
        run: |
          # 使用 GitHub 预装的 Android SDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          
          # 安装 build-tools 和 NDK
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-33" "platform-tools" "ndk;25.1.8937393"
          
          # 创建 Buildozer 期望的目录结构
          mkdir -p ~/.buildozer/android/platform/android-sdk
          
          # 创建 tools 目录和 sdkmanager 符号链接
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # 链接 build-tools
          ln -s $ANDROID_HOME/build-tools ~/.buildozer/android/platform/android-sdk/build-tools
          
          # 链接 platforms
          ln -s $ANDROID_HOME/platforms ~/.buildozer/android/platform/android-sdk/platforms
          
          # 链接 platform-tools
          ln -s $ANDROID_HOME/platform-tools ~/.buildozer/android/platform/android-sdk/platform-tools
          
          # 链接 NDK
          ln -s $ANDROID_HOME/ndk ~/.buildozer/android/platform/android-sdk/ndk

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.1.8937393
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          
          # Verify sdkmanager exists
          ls -la ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Verify build-tools
          ls -la $ANDROID_HOME/build-tools/
          
          # Build
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyuviewer-debug
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
