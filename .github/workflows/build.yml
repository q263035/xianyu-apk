name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip autoconf automake build-essential libssl-dev libffi-dev python3-dev openjdk-17-jdk
          pip3 install --upgrade pip
          pip3 install buildozer cython

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME"
          
          # 接受所有许可证（使用 yes 管道）
          echo "=== 接受许可证 ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # 安装组件
          echo "=== 安装 platform-tools ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
          
          echo "=== 安装 platforms ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
          
          echo "=== 安装 build-tools ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0"
          
          echo "=== 安装 NDK ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"
          
          # 验证安装
          echo "=== 验证安装 ==="
          ls -la $ANDROID_HOME/build-tools/
          ls -la $ANDROID_HOME/build-tools/33.0.0/
          file $ANDROID_HOME/build-tools/33.0.0/aidl
          
          # 创建 Buildozer 期望的符号链接
          echo "=== 创建符号链接 ==="
          mkdir -p ~/.buildozer/android/platform
          ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          echo "=== 环境变量 ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          
          echo "=== 验证 AIDL ==="
          find $ANDROID_HOME -name "aidl" -type f
          ls -la ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl 2>/dev/null || echo "symlink not working"
          
          echo "=== 开始编译 ==="
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyuviewer-debug
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
