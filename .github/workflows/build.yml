name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip autoconf automake build-essential libssl-dev libffi-dev python3-dev openjdk-17-jdk
          pip3 install --upgrade pip
          pip3 install buildozer cython

      - name: Install Android SDK components
        run: |
          # 使用 GitHub 预装的 Android SDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          
          # 安装 build-tools 和 NDK
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-33" "platform-tools" "ndk;25.1.8937393"
          
          # 验证安装
          echo "=== SDK 安装完成 ==="
          ls -la $ANDROID_HOME/build-tools/
          ls -la $ANDROID_HOME/build-tools/33.0.0/
          file $ANDROID_HOME/build-tools/33.0.0/aidl

      - name: Configure Buildozer to use system SDK
        run: |
          # 设置环境变量（永久）
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
          
          # 创建 Buildozer 配置文件，指定使用系统 SDK
          mkdir -p ~/.buildozer
          cat > ~/.buildozer/config << EOF
[buildozer]
sdk = /usr/local/lib/android/sdk
ndk = /usr/local/lib/android/sdk/ndk/25.1.8937393
EOF

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          echo "=== 环境变量 ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          
          echo "=== 验证 AIDL ==="
          ls -la $ANDROID_HOME/build-tools/33.0.0/aidl
          
          echo "=== 开始编译 ==="
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyuviewer-debug
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
