name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip autoconf automake build-essential libssl-dev libffi-dev python3-dev openjdk-17-jdk
          pip3 install --upgrade pip
          pip3 install buildozer cython

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME"
          
          # 接受许可证
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # 安装组件
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.1.8937393"
          
          # 验证安装
          echo "=== 验证安装 ==="
          ls -la $ANDROID_HOME/build-tools/33.0.0/
          file $ANDROID_HOME/build-tools/33.0.0/aidl

      - name: Configure Buildozer to use system SDK
        run: |
          # 创建完整的目录结构
          echo "=== 创建目录结构 ==="
          mkdir -p ~/.buildozer/android/platform
          
          # 删除可能存在的旧目录或符号链接
          rm -rf ~/.buildozer/android/platform/android-sdk
          
          # 创建符号链接
          ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          
          # 验证符号链接
          echo "=== 验证符号链接 ==="
          ls -la ~/.buildozer/android/platform/
          ls -la ~/.buildozer/android/platform/android-sdk/
          ls -la ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.1.8937393
        run: |
          # 设置 PATH
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/33.0.0:$PATH
          
          echo "=== 环境变量 ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          
          echo "=== 验证符号链接 ==="
          ls -la ~/.buildozer/android/platform/android-sdk/
          
          echo "=== 验证 AIDL ==="
          find ~/.buildozer/android/platform/android-sdk -name "aidl" -type f
          
          echo "=== 开始编译 ==="
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyuviewer-debug
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
